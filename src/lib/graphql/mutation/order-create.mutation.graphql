mutation CreateOrder($input: CreateOrderInput!) {
  createOrder(input: $input) {
    orderId
    transactionId
    paypalApproveUrl
    cryptoPaymentProof {
      orderId
      orderIdHash
      amount
      amountDisplay
      nonce
      deadline
      signature
      contractAddress
      chainId
      payerAddress
    }
    createdAt
    updatedAt
  }
}
