query Recommendations($limit: Int) {
  recommendations(limit: $limit) {
    source
    buyAgainItemIds
    records {
      itemId
      name
      image
      price
      description
      discountPercent
      requireOption {
        group
        name
        extraPrice
      }
      additionalOption {
        group
        name
        extraPrice
      }
      status
      categoryName
      createdAt
      updatedAt
    }
  }
}
